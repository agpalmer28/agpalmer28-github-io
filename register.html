<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Sprout & Grow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <img src="sprout-grow-horizontal-524-transparent.jpg" alt="Sprout and Grow logo" class="logo">
  <nav>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="events.html">Events</a></li>
      <li><a href="register.html">Register</a></li>
    </ul>
  </nav>
</header>

<section class="hero">
  <h1>Register for an Event</h1>
  <p>Reserve your spot and grow with our community.</p>
</section>

<main>

  <form class="form-container">

    <!-- Text Inputs -->
    <label for="name">Full Name</label>
    <input type="text" id="name" name="name" placeholder="Enter your full name" required>

    <label for="email">Email Address</label>
    <input type="text" id="email" name="email" placeholder="Enter your email" required>

    <label for="phone">Phone Number</label>
    <input type="text" id="phone" name="phone" placeholder="Enter your phone number">

    <!-- Textarea -->
    <label for="comments">Additional Comments</label>
    <textarea id="comments" name="comments" placeholder="Any questions or notes..."></textarea>

    <!-- Checkboxes -->
    <fieldset>
      <legend>Areas of Interest</legend>
      <label><input type="checkbox" name="interest"> Organic Gardening</label>
      <label><input type="checkbox" name="interest"> Indoor Plants</label>
      <label><input type="checkbox" name="interest"> Workshops & Events</label>
    </fieldset>

    <!-- Radio Buttons -->
    <fieldset>
      <legend>Experience Level</legend>
      <label><input type="radio" name="level"> Beginner</label>
      <label><input type="radio" name="level"> Experienced</label>
    </fieldset>

    <!-- Dropdown -->
    <label for="event">Select Event</label>
    <select id="event" name="event">
      <option>Beginner Gardening Workshop</option>
      <option>Organic Gardening Essentials</option>
      <option>Indoor Plant Care Class</option>
      <option>Seasonal Planting Workshop</option>
    </select>

    <!-- Submit -->
    <button type="submit">Submit Registration</button>

  </form>

  <p class="back-link"><a href="index.html">← Back to Home</a></p>

</main>

<footer>
  <p>Connect with us:</p>
  <a href="https://facebook.com" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/24/733/733547.png" alt="Facebook">
  </a>
  <a href="https://x.com" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/24/733/733579.png" alt="X">
  </a>
  <p>© 2026 Sprout & Grow</p>
</footer>

</body>
</html>
